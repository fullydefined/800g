<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@700&family=Red+Hat+Text:wght@400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-blue: #142948;
      --light-grey: #e2e8f0;
      --white: #ffffff;
      --error-red: #ef4444; 
    }

    * { box-sizing: border-box; }

    body {
      background-color: var(--primary-blue);
      color: var(--white);
      font-family: 'Red Hat Text', sans-serif;
      margin: 0;
      padding: 12px; 
      overflow-x: hidden; 
      width: 100vw;
    }

    .container { max-width: 600px; margin: 0 auto; width: 100%; display: block; }

    .title { font-family: 'Red Hat Display', sans-serif; font-weight: 700; font-size: 38px; line-height: 1.1; margin-bottom: 5px; color: var(--white); }
    .heading { font-family: 'Red Hat Display', sans-serif; font-weight: 700; font-size: 20px; margin-top: 0; color: var(--white); }
    .sub-heading { font-family: 'Red Hat Display', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 10px; color: var(--white); }
    .normal-text { font-family: 'Red Hat Text', sans-serif; font-weight: 400; font-size: 14px; }
    .small-text { font-family: 'Red Hat Text', sans-serif; font-weight: 400; font-size: 11px; color: var(--white); }

    input[type="date"] {
      background-color: transparent;
      border: 1px dashed var(--light-grey);
      color: var(--white);
      cursor: pointer;
      font-family: 'Red Hat Display', sans-serif;
      padding: 6px;
      border-radius: 4px;
      width: 100%;
      max-width: 145px; 
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-4px); }
    }
    .error-shake {
      animation: shake 0.4s ease-in-out;
      border: 1px solid var(--error-red) !important;
    }

    .exercise-wrapper { display: grid; margin-bottom: 12px; width: 100%; max-width: 100%; }

    .current-layer, .history-layer {
      grid-area: 1 / 1; 
      transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
      width: 100%;
    }

    .current-layer { opacity: 1; visibility: visible; transform: scale(1); z-index: 2; }
    .history-layer { opacity: 0; visibility: hidden; transform: scale(0.95); z-index: 1; }

    .exercise-wrapper.show-history .current-layer { opacity: 0; visibility: hidden; transform: scale(0.95); z-index: 1; }
    .exercise-wrapper.show-history .history-layer { opacity: 1; visibility: visible; transform: scale(1); z-index: 2; }

    .exercise-block {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--light-grey);
      padding: 12px; 
      border-radius: 8px;
      background-color: var(--primary-blue);
      width: 100%;
      max-width: 100%;
    }

    .history-block { border: 1px dashed var(--light-grey); opacity: 0.85; }
    .history-block input { background-color: transparent; border: 1px dashed var(--white); color: var(--white); }

    .exercise-header { 
      display: flex; 
      flex-direction: row; 
      gap: 4px; 
      margin-bottom: 12px; 
      align-items: center; 
      width: 100%;
      max-width: 100%;
    }

    input[type="text"], input[type="number"] { 
      background-color: var(--light-grey); 
      color: var(--primary-blue); 
      border: 1px solid var(--primary-blue); 
      border-radius: 4px; 
    }
    input::placeholder { color: var(--primary-blue); opacity: 0.6; }

    .exercise-name-input { 
      padding: 8px; 
      font-weight: bold; 
      flex: 4 1 0%; 
      width: 0; 
      min-width: 0; 
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .exercise-note-input { 
      padding: 8px 6px; 
      flex: 1 1 0%; 
      width: 0; 
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: flex 0.3s ease; 
    }
    
    .exercise-note-input:focus {
      flex: 3 1 0%; 
    }

    .sets-container { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; width: 100%; }
    .set-column { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .set-input { width: 45px; padding: 6px 4px; text-align: center; }

    button { background-color: var(--light-grey); color: var(--primary-blue); border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background-color: var(--white); }
    
    .transparent-btn { 
      background-color: transparent; 
      border: 1px solid var(--light-grey); 
      color: var(--white); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 6px 8px; 
      flex-shrink: 0; 
    }
    .transparent-btn:hover { background-color: rgba(255,255,255,0.1); }
    .btn-disabled { opacity: 0.2; pointer-events: none; border-color: transparent; }
    
    .add-set-btn { width: 40px; height: 65px; display: flex; align-items: center; justify-content: center; padding: 0; margin-bottom: 2px; }
    #status-message { margin-top: 15px; color: var(--white); font-weight: bold; min-height: 20px; text-align: center; transition: color 0.3s; }

    .icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

  <datalist id="exercise-history-list"></datalist>

  <div class="container">
    <div style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-end; gap: 10px;">
      <div style="flex-shrink: 1;">
        <div class="title">Mooscles</div>
        <input type="date" id="workout-date" class="heading" onchange="loadDateData()">
      </div>
      
      <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0;">
        <button class="transparent-btn small-text" onclick="loadLastWeekRoutine()" style="text-align: center; padding: 6px 10px; width: 100%;">Load Routine<br>From 7 Days Ago</button>
        <input type="number" inputmode="decimal" id="bodyweight-input" class="normal-text" placeholder="Bodyweight" style="width: 100%; max-width: 110px; padding: 6px 8px; text-align: center;">
      </div>
    </div>
    
    <hr style="border: 1px solid var(--light-grey); margin: 15px 0;">

    <div id="workout-list"></div>

    <button class="sub-heading transparent-btn" onpointerdown="event.preventDefault()" onclick="addExercise()" style="width: 100%;">+ Add Exercise</button>
    <br><br>
    
    <button class="heading transparent-btn" onclick="saveData()" style="width: 100%; padding: 12px;">Save Workout</button>
    <div id="status-message" class="normal-text"></div>
  </div>

  <script>
    // When the page is served directly by Apps Script, `google.script.run` is available.
    // When hosted somewhere else (GitHub Pages) we need to call the web‑app URL via fetch.
    // Set SCRIPT_URL to the published web app endpoint once you deploy via Apps Script.
    const SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';

    function callApi(action, payload) {
      payload = Object.assign({ action: action }, payload || {});
      return fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        mode: 'cors',
        body: JSON.stringify(payload)
      }).then(r => {
        if (!r.ok) throw new Error('API request failed: ' + r.status);
        return r.json();
      });
    }

    // wrapper that normalizes the interface so the rest of the code can stay mostly unchanged
    function apiRunner() {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        return google.script.run;
      }
      // fallback object for fetch
      const runner = {};
      runner.withSuccessHandler = function(fn) { this._success = fn; return this; };
      runner.withFailureHandler = function(fn) { this._failure = fn; return this; };
      runner.getTodayWorkout = function(date) {
        callApi('getTodayWorkout', { date: date })
          .then(this._success).catch(this._failure);
      };
      runner.getHistoricalExercises = function() {
        callApi('getHistoricalExercises')
          .then(this._success).catch(this._failure);
      };
      runner.getPrefetchHistory = function() {
        callApi('getPrefetchHistory')
          .then(this._success).catch(this._failure);
      };
      runner.getLastWeekRoutine = function(date) {
        callApi('getLastWeekRoutine', { date: date })
          .then(this._success).catch(this._failure);
      };
      runner.getExerciseHistory = function(name) {
        callApi('getExerciseHistory', { exerciseName: name })
          .then(this._success).catch(this._failure);
      };
      runner.saveWorkoutData = function(data, dateStr, bodyweight) {
        callApi('saveWorkoutData', { workoutData: data, dateStr: dateStr, bodyweight: bodyweight })
          .then(this._success).catch(this._failure);
      };
      return runner;
    }

    let prefetchedHistory = {};
    let activeHistoryData = {}; 

    const icons = {
      clock: `<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`,
      trash: `<svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
      left: `<svg class="icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>`,
      right: `<svg class="icon" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>`,
      close: `<svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
      plus: `<svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`
    };

    function triggerErrorShake(element) {
      element.classList.add('error-shake');
      setTimeout(() => element.classList.remove('error-shake'), 400); 
    }

    function setDateToToday() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      document.getElementById('workout-date').value = `${yyyy}-${mm}-${dd}`;
    }

    function loadDateData() {
      const selectedDate = document.getElementById('workout-date').value;
      const statusElement = document.getElementById('status-message');
      statusElement.innerText = "Loading data...";
      document.getElementById('workout-list').innerHTML = ''; 
      document.getElementById('bodyweight-input').value = ''; 
      
      apiRunner()
        .withSuccessHandler(function(response) {
          statusElement.innerText = "";
          document.getElementById('bodyweight-input').value = response.bodyweight || '';
          if (response.exercises.length > 0) rebuildUI(response.exercises);
        })
        .withFailureHandler(function(error) {
          statusElement.innerText = "Error loading data: " + error.message;
        })
        .getTodayWorkout(selectedDate);
    }

    function loadHistoricalExercises() {
      apiRunner()
        .withSuccessHandler(function(exercises) {
          const dataList = document.getElementById('exercise-history-list');
          dataList.innerHTML = ''; 
          exercises.forEach(ex => {
            const option = document.createElement('option');
            option.value = ex;
            dataList.appendChild(option);
          });
        })
        .getHistoricalExercises();
    }

    function loadPrefetchHistory() {
      apiRunner()
        .withSuccessHandler(data => prefetchedHistory = data)
        .getPrefetchHistory();
    }

    function loadLastWeekRoutine() {
      const selectedDate = document.getElementById('workout-date').value;
      const statusElement = document.getElementById('status-message');
      statusElement.innerText = "Fetching routine...";
      
      apiRunner()
        .withSuccessHandler(function(exercises) {
          if (!exercises || exercises.length === 0) {
            statusElement.style.color = 'var(--error-red)';
            statusElement.innerText = "No workout found 7 days prior.";
            setTimeout(() => { 
              statusElement.style.color = 'var(--white)'; 
              statusElement.innerText = ""; 
            }, 3000);
            return;
          }
          statusElement.innerText = "";
          exercises.forEach(exName => addExercise(exName));
        })
        .getLastWeekRoutine(selectedDate); 
    }

    function removeExercise(wrapperId) {
      document.getElementById(wrapperId).remove();
    }

    function openHistory(btnElement) {
      const wrapper = btnElement.closest('.exercise-wrapper');
      const wrapperId = wrapper.id;
      const currentLayer = wrapper.querySelector('.current-layer');
      const nameInput = currentLayer.querySelector('.exercise-name-input');
      const exName = nameInput.value.trim();
      
      if (!exName) {
        triggerErrorShake(nameInput);
        return;
      }

      if (prefetchedHistory[exName]) {
        activeHistoryData[wrapperId] = prefetchedHistory[exName];
        renderHistory(wrapperId, exName, 0); 
      } else {
        const originalHtml = btnElement.innerHTML;
        btnElement.innerHTML = "...";
        btnElement.disabled = true;

        apiRunner()
          .withSuccessHandler(function(sessionsData) {
            btnElement.innerHTML = originalHtml;
            btnElement.disabled = false;
            
            if (sessionsData && sessionsData.length > 0) {
              prefetchedHistory[exName] = sessionsData; 
              activeHistoryData[wrapperId] = sessionsData;
              renderHistory(wrapperId, exName, 0);
            } else {
              renderEmptyHistory(wrapperId, exName);
            }
          })
          .getExerciseHistory(exName);
      }
    }

    function renderEmptyHistory(wrapperId, exName) {
      const wrapper = document.getElementById(wrapperId);
      const historyLayer = wrapper.querySelector('.history-layer');
      
      historyLayer.innerHTML = `
        <div class="exercise-block history-block">
          <div class="exercise-header">
            <input type="text" class="normal-text exercise-name-input" value="${exName}" readonly>
            <button type="button" class="transparent-btn" onclick="closeHistory('${wrapperId}')">${icons.close}</button>
          </div>
          <div class="normal-text" style="text-align: center; padding: 20px 0; color: var(--white); opacity: 0.7;">
            No prior history found.
          </div>
        </div>
      `;
      wrapper.classList.add('show-history');
    }

    function renderHistory(wrapperId, exName, sessionIndex) {
      const wrapper = document.getElementById(wrapperId);
      const historyLayer = wrapper.querySelector('.history-layer');
      const sessions = activeHistoryData[wrapperId];
      
      if (!sessions || sessions.length === 0) return;
      const data = sessions[sessionIndex];

      let setsHtml = '';
      data.sets.forEach(set => {
        setsHtml += `
          <div class="set-column">
            <span class="small-text">Set ${set.setNumber}</span>
            <input type="text" class="normal-text set-input" value="${set.weight}" readonly>
            <input type="text" class="normal-text set-input" value="${set.reps}" readonly>
          </div>
        `;
      });

      const hasOlder = sessionIndex < sessions.length - 1;
      const hasNewer = sessionIndex > 0;
      
      const leftBtn = `<button type="button" class="transparent-btn ${!hasOlder ? 'btn-disabled' : ''}" onclick="renderHistory('${wrapperId}', '${exName}', ${sessionIndex + 1})">${icons.left}</button>`;
      const rightBtn = `<button type="button" class="transparent-btn ${!hasNewer ? 'btn-disabled' : ''}" onclick="renderHistory('${wrapperId}', '${exName}', ${sessionIndex - 1})">${icons.right}</button>`;
      
      const notesHtml = data.sets[0].notes ? `<input type="text" class="normal-text exercise-note-input" value="${data.sets[0].notes}" readonly>` : '';

      historyLayer.innerHTML = `
        <div class="exercise-block history-block">
          <div class="exercise-header">
            <input type="text" class="normal-text exercise-name-input" value="${exName} (${data.date})" readonly>
            ${notesHtml}
            ${leftBtn}
            ${rightBtn}
            <button type="button" class="transparent-btn" onclick="closeHistory('${wrapperId}')">${icons.close}</button>
          </div>
          <div class="sets-container">
            ${setsHtml}
          </div>
        </div>
      `;

      wrapper.classList.add('show-history');
    }

    function closeHistory(wrapperId) {
      const wrapper = document.getElementById(wrapperId);
      wrapper.classList.remove('show-history');
    }

    function rebuildUI(exercises) {
      const container = document.getElementById('workout-list');
      container.innerHTML = ''; 
      
      exercises.forEach(ex => {
        const exerciseHtml = `
          <div class="exercise-wrapper" id="wrapper-${ex.id}">
            <div class="history-layer"></div>
            
            <div class="exercise-block current-layer" id="ex-${ex.id}">
              <div class="exercise-header">
                <input type="text" list="exercise-history-list" class="normal-text exercise-name-input" value="${ex.name}" placeholder="Exercise Name">
                <input type="text" class="normal-text exercise-note-input" value="${ex.notes}" placeholder="Notes">
                <button type="button" class="transparent-btn" onclick="openHistory(this)">${icons.clock}</button>
                <button type="button" class="transparent-btn" onclick="removeExercise('wrapper-${ex.id}')">${icons.trash}</button>
              </div>
              <div class="sets-container" id="sets-${ex.id}">
                <div class="add-set-wrapper" id="add-wrapper-${ex.id}" style="display: flex; flex-direction: column; justify-content: flex-end;">
                   <button type="button" class="transparent-btn add-set-btn" onpointerdown="event.preventDefault()" onclick="addSet(${ex.id}, false)">${icons.plus}</button>
                </div>
              </div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', exerciseHtml);
        
        const wrapper = document.getElementById(`add-wrapper-${ex.id}`);
        
        ex.sets.forEach(set => {
          const setHtml = `
            <div class="set-column set-data" data-setid="${set.setId}">
              <span class="small-text">Set ${set.setNumber}</span>
              <input type="number" inputmode="decimal" class="normal-text set-input weight-input" value="${set.weight}" placeholder="Wght">
              <input type="number" inputmode="decimal" class="normal-text set-input reps-input" value="${set.reps}" placeholder="Reps">
            </div>
          `;
          wrapper.insertAdjacentHTML('beforebegin', setHtml);
        });
      });
    }

    function addExercise(prefillName) {
      const container = document.getElementById('workout-list');
      const exerciseId = Date.now() + Math.floor(Math.random() * 1000); 
      const nameValue = typeof prefillName === 'string' ? prefillName : '';
      
      const isInputActive = document.activeElement && document.activeElement.tagName === 'INPUT';
      
      const exerciseHtml = `
        <div class="exercise-wrapper" id="wrapper-${exerciseId}">
          <div class="history-layer"></div>
          
          <div class="exercise-block current-layer" id="ex-${exerciseId}">
            <div class="exercise-header">
              <input type="text" list="exercise-history-list" class="normal-text exercise-name-input" placeholder="Exercise Name" value="${nameValue}">
              <input type="text" class="normal-text exercise-note-input" placeholder="Notes">
              <button type="button" class="transparent-btn" onclick="openHistory(this)">${icons.clock}</button>
              <button type="button" class="transparent-btn" onclick="removeExercise('wrapper-${exerciseId}')">${icons.trash}</button>
            </div>
            <div class="sets-container" id="sets-${exerciseId}">
               <div class="add-set-wrapper" id="add-wrapper-${exerciseId}" style="display: flex; flex-direction: column; justify-content: flex-end;">
                   <button type="button" class="transparent-btn add-set-btn" onpointerdown="event.preventDefault()" onclick="addSet(${exerciseId}, false)">${icons.plus}</button>
                </div>
            </div>
          </div>
        </div>
      `;
      
      container.insertAdjacentHTML('beforeend', exerciseHtml);

      if (!nameValue) {
        addSet(exerciseId, false);
        addSet(exerciseId, false);
        addSet(exerciseId, false);
        
        if (isInputActive) {
          const newNameInput = document.querySelector(`#ex-${exerciseId} .exercise-name-input`);
          if (newNameInput) {
            setTimeout(() => newNameInput.focus(), 50);
          }
        }
      }
    }

    function addSet(exerciseId, autoFocus = false) {
      const wrapper = document.getElementById(`add-wrapper-${exerciseId}`);
      const setsContainer = document.getElementById(`sets-${exerciseId}`);
      
      const setNumber = setsContainer.querySelectorAll('.set-data').length + 1;
      const setId = 'set-' + Date.now() + '-' + Math.floor(Math.random() * 10000); 
      
      const setHtml = `
        <div class="set-column set-data" data-setid="${setId}">
          <span class="small-text">Set ${setNumber}</span>
          <input type="number" inputmode="decimal" class="normal-text set-input weight-input" placeholder="Wght">
          <input type="number" inputmode="decimal" class="normal-text set-input reps-input" placeholder="Reps">
        </div>
      `;
      
      wrapper.insertAdjacentHTML('beforebegin', setHtml);

      if (autoFocus) {
        const inputs = setsContainer.querySelectorAll('.weight-input');
        if (inputs.length > 0) {
          setTimeout(() => inputs[inputs.length - 1].focus(), 50);
        }
      }
    }

    function saveData() {
      const selectedDate = document.getElementById('workout-date').value;
      const bodyweight = document.getElementById('bodyweight-input').value;
      const statusElement = document.getElementById('status-message');
      statusElement.innerText = "Saving to Google Sheet...";
      
      const exercises = document.querySelectorAll('.current-layer');
      const workoutData = [];

      exercises.forEach(ex => {
        const nameInput = ex.querySelector('.exercise-name-input');
        const name = nameInput.value.trim();
        const notes = ex.querySelector('.exercise-note-input').value; 
        const setElements = ex.querySelectorAll('.set-data');
        const sets = [];
        
        let hasSetData = false;
        setElements.forEach(set => {
          if (set.querySelector('.weight-input').value !== "" || set.querySelector('.reps-input').value !== "") {
            hasSetData = true;
          }
        });

        // Smart error handling: Ignore completely blank blocks, but shake if they forgot the name
        if (!name) {
          if (hasSetData) triggerErrorShake(nameInput);
          return; 
        }

        // Now always saves all sets, even empty ones, for pre-planning
        setElements.forEach(set => {
          const weight = set.querySelector('.weight-input').value;
          const reps = set.querySelector('.reps-input').value;
          const setId = set.getAttribute('data-setid'); 
          
          sets.push({
            weight: weight,
            reps: reps,
            setNumber: Array.from(ex.querySelectorAll('.set-data')).indexOf(set) + 1,
            setId: setId
          });
        });

        if (sets.length > 0 && name !== "") {
          workoutData.push({ exercise: name, notes: notes, sets: sets });
        }
      });

      if (workoutData.length === 0 && bodyweight === "") {
        statusElement.innerText = "No data to save.";
        setTimeout(() => { statusElement.innerText = ""; }, 3000);
        return;
      }

      apiRunner()
        .withSuccessHandler(function(response) {
          statusElement.innerText = response;
          loadHistoricalExercises();
          loadPrefetchHistory();
          setTimeout(() => { statusElement.innerText = ""; }, 4000);
        })
        .withFailureHandler(function(error) {
          statusElement.innerText = "Error saving: " + error.message;
        })
        .saveWorkoutData(workoutData, selectedDate, bodyweight);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (e.target.tagName === 'INPUT') {
          e.preventDefault(); 
          const inputs = Array.from(document.querySelectorAll('input:not([readonly]):not([type="hidden"]):not([type="date"])'));
          const index = inputs.indexOf(e.target);
          
          if (index > -1 && index < inputs.length - 1) {
            inputs[index + 1].focus(); 
          } else {
            e.target.blur(); 
          }
        }
      }
    });

    window.onload = function() {
      setDateToToday(); 
      loadDateData();   
      loadHistoricalExercises(); 
      loadPrefetchHistory(); 
    };
  </script>

</body>
</html>
