<!DOCTYPE html>
<html lang="nl">
<head>
    <link rel="icon" type="image/svg+xml" href="assets/stratego-bomb.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bunker HP Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700&display=swap');

        /* Algemene instellingen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Roboto Slab', serif;
            background-color: #1a1a1a;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        /* Setup Scherm */
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background-color: #222;
            position: relative;
            z-index: 50;
        }

        .setup-box {
            background: #333;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
        }

        input {
            font-family: 'Roboto Slab', serif;
            font-size: 18px;
            padding: 10px;
            margin: 10px 0 20px 0;
            width: 100%;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
            text-align: center;
        }

        /* Team Knoppen Styling */
        .team-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .team-btn {
            font-family: 'Roboto Slab', serif;
            font-size: 18px;
            padding: 12px;
            flex: 1;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            background-color: transparent;
            border: 3px solid;
            transition: all 0.2s ease;
        }

        #btn-purple {
            border-color: #673AB7;
            color: #673AB7;
        }
        #btn-purple.selected {
            background-color: #673AB7;
            color: white;
        }

        #btn-green {
            border-color: #355E3B;
            color: #355E3B;
        }
        #btn-green.selected {
            background-color: #355E3B;
            color: white;
        }

        /* Start Spel Knop */
        .start-btn {
            font-family: 'Roboto Slab', serif;
            font-size: 20px;
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .start-btn:active {
            background-color: #0056b3;
        }

        /* Tracker Scherm */
        #tracker-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #1a1a1a; 
            transition: background-color 0.3s ease;
        }

        /* FORCEER LANDSCAPE: Draai 90 graden als telefoon rechtop staat */
        @media screen and (orientation: portrait) {
            #tracker-screen {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 100vh;
                height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg);
                transform-origin: center center;
            }
        }

        /* De vloeiend bewegende health bar */
        #health-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            transition: width 0.4s ease-out, background-color 0.2s;
            z-index: 1;
        }

        /* Gecorrigeerde Tekst Schaling (gebruikt vmin = percentage van KORTSTE kant scherm) */
        #hp-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50vmin; /* 25% van de korte kant, past altijd */
            font-weight: 700;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 10;
            text-align: center;
            width: 100%;
            line-height: 1.1; 
        }

        .game-over-text {
            font-size: 15vmin !important; /* 7.5% van de korte kant - past met gemak! */
            color: #ff3333;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { text-shadow: 0 0 10px rgba(255, 0, 0, 0.4); }
            to { text-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
        }

        /* Klikzones */
        .click-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            display: flex;
            align-items: center;
            font-size: 10vmin; /* Plus en min ook veiliger geschaald */
            color: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            z-index: 5;
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #zone-min {
            left: 0;
            justify-content: flex-start;
            padding-left: 3vw;
        }

        #zone-plus {
            right: 0;
            justify-content: flex-end;
            padding-right: 3vw;
        }

        /* Kleine Tap Animatie CSS */
        .tap-circle {
            position: absolute;
            border-radius: 50%;
            width: 10vmin;  
            height: 10vmin; 
            margin-left: -5vmin; 
            margin-top: -5vmin;
            background-color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            transform: scale(0.5);
            animation: tap-anim 0.3s ease-out forwards;
        }

        @keyframes tap-anim {
            to {
                transform: scale(1.5); 
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h1>Bunker Setup</h1>
            
            <label for="start-hp">Start HP:</label>
            <input type="number" id="start-hp" value="50" min="1">
            
            <div class="team-selector">
                <button type="button" id="btn-purple" class="team-btn selected" onclick="selectTeam('#673AB7', 'btn-purple')">Paars</button>
                <button type="button" id="btn-green" class="team-btn" onclick="selectTeam('#355E3B', 'btn-green')">Groen</button>
            </div>

            <button class="start-btn" onclick="startTracker()">Start Spel</button>
        </div>
    </div>

    <div id="tracker-screen">
        <div id="health-bar-fill"></div>
        <div id="zone-min" class="click-zone" onclick="changeHP(-1, event)">-</div>
        <div id="zone-plus" class="click-zone" onclick="changeHP(1, event)">+</div>
        <div id="hp-display">50</div>
    </div>

    <script>
        let maxHP = 50;
        let currentHP = 50;
        let activeColor = "#673AB7"; // Standaardkleur (Paars)
        let wakeLock = null;
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        // Functie voor de teamknoppen
        function selectTeam(color, btnId) {
            activeColor = color;
            document.getElementById('btn-purple').classList.remove('selected');
            document.getElementById('btn-green').classList.remove('selected');
            document.getElementById(btnId).classList.add('selected');
        }

        async function startTracker() {
            maxHP = parseInt(document.getElementById('start-hp').value) || 1;
            currentHP = maxHP;

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('tracker-screen').style.display = 'block';
            
            document.getElementById('health-bar-fill').style.backgroundColor = activeColor;

            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            requestWakeLock();
            updateDisplay();
        }

        function playThudSound() {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log('Wake Lock mislukt of niet ondersteund door deze browser.');
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        function changeHP(amount, event) {
            if (currentHP === 0 && amount < 0) return;

            let vorigeHP = currentHP;
            currentHP += amount;
            
            if (currentHP < 0) currentHP = 0; 
            if (currentHP > maxHP) currentHP = maxHP; 

            if (amount < 0 && currentHP >= 0 && vorigeHP > 0) {
                playThudSound();
            }

            if (currentHP > 0) {
                if (navigator.vibrate) {
                    navigator.vibrate(40); 
                }
            }
            
            updateDisplay();
            createSmallTap(event);
        }

        function updateDisplay() {
            const display = document.getElementById('hp-display');
            const trackerScreen = document.getElementById('tracker-screen');

            if (currentHP <= 0) {
                display.innerHTML = "BUNKER<br>VERNIETIGD";
                display.classList.add("game-over-text");
                document.getElementById('health-bar-fill').style.width = "0%";
                trackerScreen.style.backgroundColor = "#2a0000"; 
            } else {
                display.innerText = currentHP;
                display.classList.remove("game-over-text");
                trackerScreen.style.backgroundColor = "#1a1a1a"; 

                let percentage = (currentHP / maxHP) * 100;
                if (percentage > 100) percentage = 100;
                document.getElementById('health-bar-fill').style.width = percentage + "%";
            }
        }

        function createSmallTap(event) {
            const zone = event.currentTarget;
            const circle = document.createElement("span");
            
            let clientX = zone.clientWidth / 2;
            let clientY = zone.clientHeight / 2;

            circle.style.left = `${clientX}px`;
            circle.style.top = `${clientY}px`;
            circle.classList.add("tap-circle");

            zone.appendChild(circle);

            setTimeout(() => {
                circle.remove();
            }, 300); 
        }
    </script>
</body>
</html>
